<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homie — Food Placeholder</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    min-height: 100vh;
    padding: 60px 40px;
    font-family: 'Space Mono', monospace;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(180,100,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,100,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .label {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: #6b4fa0; margin-bottom: 12px; text-align: center;
  }

  .section { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }

  /* ── The Placeholder Card ── */
  .food-placeholder {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #120820;
    border: 1px solid #2d1050;
  }

  /* Size variants */
  .food-placeholder.wide   { width: 560px; height: 320px; }
  .food-placeholder.square { width: 320px; height: 320px; }
  .food-placeholder.card   { width: 280px; height: 200px; border-radius: 12px; }

  /* Gradient mesh background */
  .food-placeholder::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(192,38,211,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(37,99,235,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 55% 80%, rgba(124,58,237,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Diagonal stripe texture */
  .food-placeholder::after {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 12px,
      rgba(255,255,255,0.015) 12px,
      rgba(255,255,255,0.015) 13px
    );
    pointer-events: none;
  }

  .placeholder-inner {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }

  /* Icon bowl SVG */
  .placeholder-icon {
    opacity: 0.6;
  }

  .food-placeholder.card .placeholder-icon { transform: scale(0.75); }

  .placeholder-text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    color: rgba(200,180,255,0.45);
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.4;
  }

  .food-placeholder.wide   .placeholder-text { font-size: 15px; }
  .food-placeholder.square .placeholder-text { font-size: 14px; }
  .food-placeholder.card   .placeholder-text { font-size: 11px; }

  .placeholder-tag {
    font-family: 'Space Mono', monospace;
    font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(160,130,220,0.4);
    border: 1px solid rgba(160,130,220,0.2);
    padding: 2px 10px; border-radius: 3px;
  }

  /* Corner dashes */
  .corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: rgba(160,130,220,0.25);
    border-style: solid;
  }
  .corner.tl { top: 12px; left: 12px;  border-width: 1px 0 0 1px; }
  .corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 12px; left: 12px;  border-width: 0 0 1px 1px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  /* Grid of card previews */
  .card-grid {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
    position: relative; z-index: 1;
  }
</style>
</head>
<body>

  <!-- WIDE (hero / article banner) -->
  <div class="section">
    <div class="label">Wide — Article Banner</div>
    <div class="food-placeholder wide">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="placeholder-inner">
        <svg class="placeholder-icon" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Steam lines -->
          <path d="M28 14 C28 10 32 10 32 6" stroke="rgba(192,38,211,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M36 16 C36 12 40 12 40 8" stroke="rgba(124,58,237,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M44 14 C44 10 48 10 48 6" stroke="rgba(37,99,235,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Bowl -->
          <path d="M14 36 C14 52 58 52 58 36" stroke="rgba(200,160,255,0.7)" stroke-width="1.5" fill="rgba(120,60,180,0.08)"/>
          <!-- Rim -->
          <line x1="12" y1="36" x2="60" y2="36" stroke="rgba(200,160,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Base / stand -->
          <path d="M26 52 L24 58 M46 52 L48 58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="22" y1="58" x2="50" y2="58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Fork on left -->
          <line x1="10" y1="24" x2="10" y2="46" stroke="rgba(160,120,220,0.35)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="8"  y1="24" x2="8"  y2="30" stroke="rgba(160,120,220,0.3)" stroke-width="1" stroke-linecap="round"/>
          <line x1="12" y1="24" x2="12" y2="30" stroke="rgba(160,120,220,0.3)" stroke-width="1" stroke-linecap="round"/>
          <!-- Knife on right -->
          <line x1="62" y1="24" x2="62" y2="46" stroke="rgba(160,120,220,0.35)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M62 24 L65 30 L62 32" stroke="rgba(160,120,220,0.3)" stroke-width="1" stroke-linecap="round" fill="none"/>
        </svg>
        <div class="placeholder-text">No photo yet —<br>something delicious is coming</div>
        <div class="placeholder-tag">&#9632; homie food</div>
      </div>
    </div>
  </div>

  <!-- SQUARE (grid / feed) -->
  <div class="section">
    <div class="label">Square — Feed / Grid</div>
    <div class="food-placeholder square">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="placeholder-inner">
        <svg class="placeholder-icon" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M28 14 C28 10 32 10 32 6" stroke="rgba(192,38,211,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M36 16 C36 12 40 12 40 8" stroke="rgba(124,58,237,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M44 14 C44 10 48 10 48 6" stroke="rgba(37,99,235,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M14 36 C14 52 58 52 58 36" stroke="rgba(200,160,255,0.7)" stroke-width="1.5" fill="rgba(120,60,180,0.08)"/>
          <line x1="12" y1="36" x2="60" y2="36" stroke="rgba(200,160,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M26 52 L24 58 M46 52 L48 58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="22" y1="58" x2="50" y2="58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="24" x2="10" y2="46" stroke="rgba(160,120,220,0.35)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="8"  y1="24" x2="8"  y2="30" stroke="rgba(160,120,220,0.3)" stroke-width="1" stroke-linecap="round"/>
          <line x1="12" y1="24" x2="12" y2="30" stroke="rgba(160,120,220,0.3)" stroke-width="1" stroke-linecap="round"/>
          <line x1="62" y1="24" x2="62" y2="46" stroke="rgba(160,120,220,0.35)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M62 24 L65 30 L62 32" stroke="rgba(160,120,220,0.3)" stroke-width="1" stroke-linecap="round" fill="none"/>
        </svg>
        <div class="placeholder-text">Photo coming soon</div>
        <div class="placeholder-tag">&#9632; homie food</div>
      </div>
    </div>
  </div>

  <!-- CARD (small thumbnails) -->
  <div class="section">
    <div class="label">Card — Thumbnails</div>
    <div class="card-grid">
      <div class="food-placeholder card">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="placeholder-inner">
          <svg class="placeholder-icon" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M28 14 C28 10 32 10 32 6" stroke="rgba(192,38,211,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M36 16 C36 12 40 12 40 8" stroke="rgba(124,58,237,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M44 14 C44 10 48 10 48 6" stroke="rgba(37,99,235,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14 36 C14 52 58 52 58 36" stroke="rgba(200,160,255,0.7)" stroke-width="1.5" fill="rgba(120,60,180,0.08)"/>
            <line x1="12" y1="36" x2="60" y2="36" stroke="rgba(200,160,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M26 52 L24 58 M46 52 L48 58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="22" y1="58" x2="50" y2="58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div class="placeholder-text">No photo</div>
        </div>
      </div>
      <div class="food-placeholder card">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="placeholder-inner">
          <svg class="placeholder-icon" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M28 14 C28 10 32 10 32 6" stroke="rgba(192,38,211,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M36 16 C36 12 40 12 40 8" stroke="rgba(124,58,237,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M44 14 C44 10 48 10 48 6" stroke="rgba(37,99,235,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14 36 C14 52 58 52 58 36" stroke="rgba(200,160,255,0.7)" stroke-width="1.5" fill="rgba(120,60,180,0.08)"/>
            <line x1="12" y1="36" x2="60" y2="36" stroke="rgba(200,160,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M26 52 L24 58 M46 52 L48 58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="22" y1="58" x2="50" y2="58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div class="placeholder-text">No photo</div>
        </div>
      </div>
      <div class="food-placeholder card">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="placeholder-inner">
          <svg class="placeholder-icon" width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M28 14 C28 10 32 10 32 6" stroke="rgba(192,38,211,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M36 16 C36 12 40 12 40 8" stroke="rgba(124,58,237,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M44 14 C44 10 48 10 48 6" stroke="rgba(37,99,235,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M14 36 C14 52 58 52 58 36" stroke="rgba(200,160,255,0.7)" stroke-width="1.5" fill="rgba(120,60,180,0.08)"/>
            <line x1="12" y1="36" x2="60" y2="36" stroke="rgba(200,160,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M26 52 L24 58 M46 52 L48 58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="22" y1="58" x2="50" y2="58" stroke="rgba(160,120,220,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <div class="placeholder-text">No photo</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
