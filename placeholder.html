<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homie — Generic Food Placeholders</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&family=DM+Sans:wght@400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0ede8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 64px;
    padding: 64px 40px;
    font-family: 'DM Sans', sans-serif;
  }

  h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 20px;
    text-align: center;
  }

  .section { display: flex; flex-direction: column; align-items: center; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

  /* ═══════════════════════════════
     01 — LIGHT MINIMAL
  ═══════════════════════════════ */
  .ph-light {
    width: 320px; height: 220px;
    background: #faf9f7;
    border: 1.5px dashed #d8d3cc;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    position: relative;
  }

  .ph-light .icon { opacity: 0.3; }

  .ph-light .txt {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: #bbb;
    letter-spacing: 0.05em;
  }

  /* ═══════════════════════════════
     02 — WARM EARTHY
  ═══════════════════════════════ */
  .ph-warm {
    width: 320px; height: 220px;
    background: #f5ede0;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  .ph-warm::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 60%, rgba(210,160,90,0.15) 0%, transparent 70%),
                radial-gradient(ellipse at 75% 30%, rgba(180,120,70,0.1) 0%, transparent 60%);
  }

  .ph-warm .txt {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 14px;
    color: #c8a882;
    position: relative; z-index: 1;
  }

  .ph-warm .icon { position: relative; z-index: 1; opacity: 0.45; }

  /* ═══════════════════════════════
     03 — DARK MOODY
  ═══════════════════════════════ */
  .ph-dark {
    width: 320px; height: 220px;
    background: #1e1e1e;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .ph-dark::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(255,255,255,0.03) 0%, transparent 70%);
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 28px,
      rgba(255,255,255,0.015) 28px, rgba(255,255,255,0.015) 29px
    );
  }

  .ph-dark .txt {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    position: relative; z-index: 1;
  }

  .ph-dark .icon { position: relative; z-index: 1; opacity: 0.2; }

  /* ═══════════════════════════════
     04 — EDITORIAL / MAGAZINE
  ═══════════════════════════════ */
  .ph-editorial {
    width: 320px; height: 220px;
    background: #f7f4ef;
    border-radius: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    position: relative;
    border: 1px solid #e2ddd6;
  }

  /* cross-hatch corners */
  .ph-editorial::before, .ph-editorial::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: #c8c0b4;
    border-style: solid;
  }
  .ph-editorial::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .ph-editorial::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .ph-editorial .corner-tr, .ph-editorial .corner-bl {
    position: absolute;
    width: 24px; height: 24px;
    border-color: #c8c0b4;
    border-style: solid;
  }
  .ph-editorial .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .ph-editorial .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

  .ph-editorial .txt {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: #b8b0a4;
    letter-spacing: 0.02em;
  }

  .ph-editorial .sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    color: #ccc;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .ph-editorial .icon { opacity: 0.25; }

  /* ═══════════════════════════════
     CARD SIZE VARIANTS
  ═══════════════════════════════ */
  .ph-light.sm, .ph-warm.sm, .ph-dark.sm, .ph-editorial.sm {
    width: 180px; height: 140px;
    border-radius: 8px;
    gap: 8px;
  }
  .ph-light.sm .txt, .ph-warm.sm .txt, .ph-dark.sm .txt, .ph-editorial.sm .txt {
    font-size: 10px;
  }
  .ph-editorial.sm { border-radius: 0; }

</style>
</head>
<body>

  <!-- 01: Light Minimal -->
  <div class="section">

    <div class="row">
      <div class="ph-light">

          <path d="M62 24 L65 30 L62 32" stroke="#aaa" stroke-width="1" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="txt">No photo available</span>

          <line x1="12" y1="36" x2="60" y2="36" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="txt">No photo</span>
      </div>
    </div>
