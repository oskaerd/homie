services:
  homie:
    image: homie:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: /app/data/homie.db
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    volumes:
      - homie_data:/app/data
      - ./backups:/app/data/backups
      # Mount a folder from the RPi host so you can drop photos in without rebuilding the image.
      # Create the folder first: mkdir -p ~/homie-slideshow
      - ${SLIDESHOW_DIR:-./public/slideshow}:/app/public/slideshow
    restart: unless-stopped

volumes:
  homie_data:
