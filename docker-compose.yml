services:
  homie:
    image: homie:latest
    environment:
      DATABASE_URL: /app/data/homie.db
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: https://${TAILSCALE_HOSTNAME}
    volumes:
      - homie_data:/app/data
      - ${BACKUP_DIR:-./backups}:/app/data/backups
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      TAILSCALE_HOSTNAME: ${TAILSCALE_HOSTNAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
    depends_on:
      - homie
    restart: unless-stopped

volumes:
  homie_data:
  caddy_data:
